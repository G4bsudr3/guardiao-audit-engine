services:
  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build: .
    restart: always
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
    volumes:
      - workdir:/workdir
      - failed-submissions:/data/failed-submissions
    command: node src/server.js

  worker:
    build: .
    restart: always
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
    volumes:
      - workdir:/workdir
      - failed-submissions:/data/failed-submissions
    command: node src/worker.js

volumes:
  redis-data:
  workdir:
  failed-submissions:
